<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>For My Love ❤️</title>

<style>
body{
    margin:0;
    padding:0;
    font-family: "Arial", sans-serif;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
}

.container{
    background: rgba(255,255,255,0.15);
    padding:40px;
    border-radius:20px;
    backdrop-filter: blur(10px);
}

h1{
    font-size:40px;
}

p{
    font-size:20px;
}

button{
    margin-top:20px;
    padding:10px 25px;
    font-size:18px;
    border:none;
    border-radius:20px;
    background:#ff4d6d;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#ff1e4d;
}

.heart{
    position: fixed;
    color:red;
    font-size:20px;
    animation: float 6s linear infinite;
}

@keyframes float{
    0%{
        transform: translateY(100vh);
        opacity:1;
    }
    100%{
        transform: translateY(-10vh);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>ถึงแฟนของฉัน ❤️</h1>
    <p>
        ตั้งแต่วันที่เราได้เจอกัน<br>
        ชีวิตของฉันก็มีความสุขขึ้นมาก<br><br>

        ขอบคุณที่อยู่ข้าง ๆ กันเสมอ<br>
        ฉันรักเธอมากนะ 💕
    </p>

    <button onclick="showLove()">กดตรงนี้สิ</button>
</div>

<script>

function showLove(){
    alert("รักเธอที่สุดเลยนะ ❤️");
}

function createHeart(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random()*100 + "vw";
    heart.style.fontSize = (Math.random()*20+10)+"px";
    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },6000);
}

setInterval(createHeart,300);

</script>

</body>
</html>
